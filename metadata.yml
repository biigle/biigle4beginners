type: LearningResource
name: BIIGLE for Beginners
description: >-
  A tutorial for BIIGLE (https://biigle.de), a web-based platform for annotating
  images and videos.


  The tutorial teaches the complete beginner workflow: from creating a user
  account, through setting up projects and annotating data, to exporting the
  results. Each chapter introduces one concept, then gives you a hands-on task
  to solve on biigle.de.


  The target audience is anyone who is new to BIIGLE and wants to learn how to
  set up their own annotation projects and how to annotate.
